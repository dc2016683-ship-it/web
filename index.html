<!DOCTYPE html><!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>King Os - Stream Status</title>
    <style>
        /* Estilo general estilo Cyberpunk */
        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            min-height: 100vh;
            margin: 0;
            gap: 20px;
        }

        .container {
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card {
            background: #111;
            border: 2px solid #222;
            border-radius: 20px;
            width: 300px;
            padding: 30px;
            text-align: center;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        /* Efecto Glow al pasar el mouse */
        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        .platform-name {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        /* Indicador de Estado */
        .status {
            font-size: 0.9rem;
            font-weight: bold;
            padding: 6px 15px;
            border-radius: 50px;
            display: inline-block;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        .offline {
            background: #222;
            color: #777;
            border: 1px solid #444;
        }

        /* Estilos específicos por plataforma */
        .youtube-card { border-color: #ff0000; }
        .youtube-card:hover { box-shadow: 0 0 30px rgba(255, 0, 0, 0.3); }
        .yt-text { color: #ff0000; }

        .kick-card { border-color: #53fc18; }
        .kick-card:hover { box-shadow: 0 0 30px rgba(83, 252, 24, 0.3); }
        .kick-text { color: #53fc18; }

        .twitch-card { border-color: #9146FF; }
        .twitch-card:hover { box-shadow: 0 0 30px rgba(145, 70, 255, 0.3); }
        .tw-text { color: #9146FF; }

        .btn {
            display: inline-block;
            margin-top: 15px;
            padding: 12px 25px;
            background: #fff;
            color: #000;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            background: #ddd;
            transform: scale(1.05);
        }

        .link-preview {
            font-size: 0.8rem;
            color: #555;
            margin-top: 10px;
            display: block;
            word-break: break-all;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- Tarjeta YouTube -->
        <div class="card youtube-card">
            <div class="status offline">DESCONECTADO</div>
            <div class="platform-name yt-text">YouTube</div>
            <p>King_Os1207</p>
            <a href="https://www.youtube.com/@King_Os1207" target="_blank" class="btn">VER CANAL</a>
            <span class="link-preview">youtube.com/@King_Os1207</span>
        </div>

        <!-- Tarjeta Kick -->
        <div class="card kick-card">
            <div class="status offline">DESCONECTADO</div>
            <div class="platform-name kick-text">Kick</div>
            <p>king-os-1234</p>
            <a href="https://kick.com/king-os-1234" target="_blank" class="btn">VER CANAL</a>
            <span class="link-preview">kick.com/king-os-1234</span>
        </div>

        <!-- Tarjeta Twitch -->
        <div class="card twitch-card">
            <div class="status offline">DESCONECTADO</div>
            <div class="platform-name tw-text">Twitch</div>
            <p>KING_OS_1234</p>
            <a href="https://kick.com/king-os-1234" target="_blank" class="btn">VER CANAL</a>
            <span class="link-preview">kick.com/king-os-1234</span>
        </div>

    </div>

</body>
</html>
