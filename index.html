<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>King Os - Stream Status</title>
    <style>
        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            min-height: 100vh;
            margin: 0;
            gap: 20px;
        }
       .container { display: flex; gap: 25px; flex-wrap: wrap; justify-content: center; }
       .card {
            background: #111;
            border: 2px solid #222;
            border-radius: 20px;
            width: 300px;
            padding: 30px;
            text-align: center;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }
       .card:hover { transform: translateY(-10px); box-shadow: 0 0 20px rgba(255, 255, 255, 0.1); }
       .platform-name { font-size: 1.8rem; font-weight: 800; margin-bottom: 10px; text-transform: uppercase; }
       .status {
            font-size: 0.8rem; font-weight: bold; padding: 6px 15px;
            border-radius: 50px; display: inline-block; margin-bottom: 20px; letter-spacing: 1px;
        }
       .offline { background: #222; color: #777; border: 1px solid #444; }
       .live {
            background: #ff0000; color: #fff; border: 1px solid #ff4444;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 rgba(255, 0, 0, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(255, 0, 0, 0); }
            100% { box-shadow: 0 0 rgba(255, 0, 0, 0); }
        }
       .youtube-card { border-color: #ff0000; }
       .youtube-card:hover { box-shadow: 0 0 30px rgba(255, 0, 0, 0.3); }
       .yt-text { color: #ff0000; }
       .kick-card { border-color: #53fc18; }
       .kick-card:hover { box-shadow: 0 0 30px rgba(83, 252, 24, 0.3); }
       .kick-text { color: #53fc18; }
       .kick-card.live { background: #53fc18; color: #000; border: 1px solid #53fc18; }
       .twitch-card { border-color: #9146FF; }
       .twitch-card:hover { box-shadow: 0 0 30px rgba(145, 70, 255, 0.3); }
       .tw-text { color: #9146FF; }
       .twitch-card.live { background: #9146FF; border: 1px solid #9146FF; }
       .btn {
            display: inline-block; margin-top: 15px; padding: 12px 25px;
            background: #fff; color: #000; text-decoration: none;
            border-radius: 10px; font-weight: bold; transition: 0.3s;
        }
       .btn:hover { background: #ddd; transform: scale(1.05); }
       .link-preview { font-size: 0.8rem; color: #555; margin-top: 10px; display: block; word-break: break-all; }
       .viewers { font-size: 0.9rem; margin-top: 8px; color: #aaa; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Tarjeta YouTube -->
        <div class="card youtube-card" id="youtube-card">
            <div class="status offline" id="yt-status">CHEQUA SI VESKARD ANDA EN LIVE O NO</div>
            <div class="platform-name yt-text">YouTube</div>
            <p>King_Os1207</p>
            <div class="viewers" id="yt-viewers"></div>
            <a href="https://www.youtube.com/@King_Os1207" target="_blank" class="btn">VER CANAL</a>
            <span class="link-preview">youtube.com/@King_Os1207</span>
        </div>

        <!-- Tarjeta Kick -->
        <div class="card kick-card" id="kick-card">
            <div class="status offline" id="kick-status">CHEQUA SI VESKARD ANDA EN LIVE O NO</div>
            <div class="platform-name kick-text">Kick</div>
            <p>king-os-1234</p>
            <div class="viewers" id="kick-viewers"></div>
            <a href="https://kick.com/king-os-1234" target="_blank" class="btn">VER CANAL</a>
            <span class="link-preview">kick.com/king-os-1234</span>
        </div>

        <!-- Tarjeta Twitch -->
        <div class="card twitch-card" id="twitch-card">
            <div class="status offline" id="twitch-status">CHEQUA SI VESKARD ANDA EN LIVE O NO</div>
            <div class="platform-name tw-text">Twitch</div>
            <p>KING_OS_1234</p>
            <div class="viewers" id="twitch-viewers"></div>
            <a href="https://twitch.tv/KING_OS_1234" target="_blank" class="btn">VER CANAL</a>
            <span class="link-preview">twitch.tv/KING_OS_1234</span>
        </div>
    </div>

<script>
const CONFIG = {
    youtube: { channelId: 'UCxxxxxxxxxxxxx', name: 'King_Os1207' },
    kick: { username: 'king-os-1234' },
    twitch: { username: 'KING_OS_1234' },
    apiEndpoint: 'https://tu-api.com/check-stream'
};

const OFFLINE_TEXT = "CHEQUA SI VESKARD ANDA EN LIVE O NO";

async function checkStreamStatus() {
    try {
        const res = await fetch(`${CONFIG.apiEndpoint}?twitch=${CONFIG.twitch.username}&kick=${CONFIG.kick.username}&youtube=${CONFIG.youtube.channelId}`);
        const data = await res.json();

        // YouTube
        const ytStatus = document.getElementById('yt-status');
        const ytViewers = document.getElementById('yt-viewers');
        if (data.youtube.live) {
            ytStatus.textContent = 'EN VIVO';
            ytStatus.className = 'status live';
            ytViewers.textContent = `${data.youtube.viewers} viewers`;
        } else {
            ytStatus.textContent = OFFLINE_TEXT;
            ytStatus.className = 'status offline';
            ytViewers.textContent = '';
        }

        // Kick
        const kickStatus = document.getElementById('kick-status');
        const kickViewers = document.getElementById('kick-viewers');
        if (data.kick.live) {
            kickStatus.textContent = 'EN VIVO';
            kickStatus.className = 'status live';
            kickViewers.textContent = `${data.kick.viewers} viewers`;
        } else {
            kickStatus.textContent = OFFLINE_TEXT;
            kickStatus.className = 'status offline';
            kickViewers.textContent = '';
        }

        // Twitch
        const twitchStatus = document.getElementById('twitch-status');
        const twitchViewers = document.getElementById('twitch-viewers');
        if (data.twitch.live) {
            twitchStatus.textContent = 'EN VIVO';
            twitchStatus.className = 'status live';
            twitchViewers.textContent = `${data.twitch.viewers} viewers`;
        } else {
            twitchStatus.textContent = OFFLINE_TEXT;
            twitchStatus.className = 'status offline';
            twitchViewers.textContent = '';
        }
    } catch (e) {
        console.error('Error checando streams:', e);
    }
}

checkStreamStatus();
setInterval(checkStreamStatus, 30000);
</script>
</body>
</html>
