<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Veskard Live View</title>
    <style>
        body {
            background-color: #050505;
            color: #00f3ff;
            font-family: 'Orbitron', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        .monitor-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
        }

        .panel {
            background: #111;
            border: 2px solid #00f3ff;
            border-radius: 20px;
            overflow: hidden;
            width: 450px;
            height: 600px;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.2);
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            padding: 10px;
            text-align: center;
            background: #1a1a1a;
            border-bottom: 1px solid #333;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        /* El cuadro que muestra tu perfil real */
        .live-frame {
            width: 100%;
            height: 100%;
            border: none;
            background: #000;
        }

        .kick-border { border-color: #53fc18; box-shadow: 0 0 20px rgba(83, 252, 24, 0.2); }
        .kick-text { color: #53fc18; }

        h1 {
            text-shadow: 0 0 10px #00f3ff;
            letter-spacing: 4px;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>

    <h1>STREAM MONITOR SYSTEM</h1>

    <div class="monitor-container">
        
        <!-- PANEL DE TWITCH -->
        <div class="panel">
            <div class="panel-header">Twitch: king_os12857</div>
            <!-- Cargamos el perfil móvil para que se vea mejor en el cuadro -->
            <iframe 
                src="https://m.twitch.tv/king_os12857" 
                class="live-frame">
            </iframe>
        </div>

        <!-- PANEL DE KICK -->
        <div class="panel kick-border">
            <div class="panel-header kick-text">Kick: king-os-1234</div>
            <iframe 
                src="https://kick.com/king-os-1234" 
                class="live-frame">
            </iframe>
        </div>

    </div>

    <p style="color: #444; font-size: 0.7rem; margin-top: 20px;">
        Nota: Si Twitch dice "Refused", es porque necesitas abrir este archivo desde un servidor (GitHub Pages).
    </p>

</body>
</html>
